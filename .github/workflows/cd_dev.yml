name: Deploy to dev 

on:
    push:
        branches: 
            - main

jobs:
    redeploy:
        name: deploying the change to dev server
        runs-on: ubuntu-latest
        steps:
            - name: Checkout the code
              uses: actions/checkout@v2

            - name: chech secret key
              run: |
                if [ -z "${{ secrets.SSH_SECRET_KEY }}" ]; then
                    echo "SECRET EMPTY"
                    exit 1
                else
                    echo "SECRET FOUND"
                fi

            - name: Execute remote SSH commands using SSH key
              uses: appleboy/ssh-action@v1.2.5
              with:
                host: 15.134.212.87
                username: ubuntu
                key: ${{ secrets.SSH_SECRET_KEY }}
                port: 22
                script: echo "hello"
            

